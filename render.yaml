services:
  - type: web
    name: nascondino-server
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nascondino-db
          property: connectionString
      - key: ADMIN_UNLOCK_CODE
        sync: false # lo imposti tu manualmente nella dashboard Render dopo il deploy
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: nascondino-db
    plan: free
